name: Playwright Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgresql:
        image: postgres
        env:
          POSTGRES_USER: sample_user
          POSTGRES_PASSWORD: sample_password
          POSTGRES_DB: sample_test_db
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install system packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y curl libjemalloc2 libvips postgresql-client

      - name: setup ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: backend/

      - name: install ruby dependencies
        run: bundle install
        working-directory: backend/

      - name: setup node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install node dependencies
        run: npm ci
        working-directory: frontend/

      - name: install playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend/
        timeout-minutes: 10

      - name: setup database and start rails api server
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://sample_user:sample_password@127.0.0.1:5432/sample_test_db
        run: |
          bin/rails db:create db:schema:load db:seed
          bin/rails server -p 3000 -e test &
          echo $! > tmp/server.pid
        working-directory: backend/

      - name: wait for rails api
        run: npx wait-on --timeout 60000 http://localhost:3000
        working-directory: backend/

      - name: run playwright tests
        run: npx playwright test
        working-directory: frontend/

      - name: upload playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7